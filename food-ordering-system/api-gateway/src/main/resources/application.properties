spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.server.webflux.routes[0].id=customer-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://127.0.0.1:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/customers,/api/customers/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=menu-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://127.0.0.1:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/menu,/api/menu/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.server.webflux.routes[1].filters[1]=RewritePath=/menu/?(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[2].id=order-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://127.0.0.1:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/orders,/api/orders/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[3].id=payment-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://127.0.0.1:8084
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payments,/api/payments/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[4].id=customer-service-docs
spring.cloud.gateway.server.webflux.routes[4].uri=http://127.0.0.1:8081
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/customer-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/customer-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[5].id=menu-service-docs
spring.cloud.gateway.server.webflux.routes[5].uri=http://127.0.0.1:8082
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/menu-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/menu-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[6].id=order-service-docs
spring.cloud.gateway.server.webflux.routes[6].uri=http://127.0.0.1:8083
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/order-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/order-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[7].id=payment-service-docs
spring.cloud.gateway.server.webflux.routes[7].uri=http://127.0.0.1:8084
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/payment-service/(?<segment>.*), /$\{segment}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.urls[0].name=customer-service
springdoc.swagger-ui.urls[0].url=/customer-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=menu-service
springdoc.swagger-ui.urls[1].url=/menu-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=order-service
springdoc.swagger-ui.urls[2].url=/order-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=payment-service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs

spring.devtools.livereload.enabled=false

logging.level.root=INFO
